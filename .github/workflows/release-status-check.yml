name: release-status-check
on:
  pull_request:
    branches:
      - main
      - release/*
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "**/*.md"

permissions:
  contents: read

jobs:
  build:
    name: mkdocs build --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs + plugins (from requirements.txt)
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate site builds cleanly
        run: mkdocs build --strict
