
<h2 class="sectionedit1" id="dnkk_kano_flight_information_region">DNKK Kano Flight Information Region</h2>
<div class="level2">
<ul>
<li class="level1"><div class="li"> The Kano FIR covers the entirety of <a href="/nigeria" class="wikilink1" title="nigeria" data-wiki-id="nigeria">Nigeria</a>&#039;s borders. It is neighbored by <a href="/dgac" class="wikilink2" title="dgac" rel="nofollow" data-wiki-id="dgac">Accra</a> FIR in the West, the Niamey FIR in the North, the N&#039;Djamena FIR, the Northeast and <a href="/fccc" class="wikilink2" title="fccc" rel="nofollow" data-wiki-id="fccc">Brazzaville</a> in the East and Accra Oceanic in the South.</div>
</li>
</ul>

</div>
